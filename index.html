<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOTASTATS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ═══════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════ -->

<header class="header">
<div class="header__left">
<div class="logo">
  <svg class="logo__icon"></svg>
  <h2 class="logo__text">DOTA<span class="logo__accent">STATS</span></h2>
</div>
<nav class="nav">
  <ul class="nav__list">
    <li class="nav__item">OVERVIEW</li>
    <li class="nav__item">HEROES</li>
    <li class="nav__item">PLAYERS</li>
    <li class="nav__item">MATCHES</li>
    <li class="nav__item">META</li>
  </ul>
</nav>
</div>

<div class="header__right">
  <div class="search">
    <svg src="/images/search-img.svg" class="search__icon">
      <use href="/images/symbol-defs.svg#icon-search"></use>
    </svg>
    <input class="search__input" type="text" placeholder="Search hero or player...">
  </div>
   <button class="live-btn">⬤ LIVE</button>
</div>

</header>












</body>
</html>
